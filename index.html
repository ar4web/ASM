<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stamp Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Tajawal:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- Top Bar -->
  <header class="topbar">
    <span class="brand">🖊️ Stamp Studio</span>
    
    <div class="tools">
      <button class="tool-btn active" data-tool="select" title="Select (V)">
        <svg viewBox="0 0 24 24"><path d="M2 2l8 20L10 11l11-3L2 2z" fill="none" stroke="currentColor"/></svg>
      </button>
      <button class="tool-btn" data-tool="text" title="Text (T)">
        <svg viewBox="0 0 24 24"><path d="M5 7h14M5 12h14M5 17h10" stroke="currentColor" fill="none"/></svg>
      </button>
      <button class="tool-btn" data-tool="shape-rectangle" title="Rectangle">
        <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" stroke="currentColor" fill="none"/></svg>
      </button>
      <button class="tool-btn" data-tool="shape-circle" title="Circle">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="7" stroke="currentColor" fill="none"/></svg>
      </button>
    </div>

    <div class="actions">
      <button class="action-btn" id="undoBtn" title="Undo">↶</button>
      <button class="action-btn" id="redoBtn" title="Redo">↷</button>
      <button class="action-btn primary" id="saveBtn" title="Save">💾</button>
      <button class="action-btn primary" id="exportBtn" title="Export PNG">⬇ Export</button>
      <span class="zoom" id="zoomLabelMain">100%</span>
    </div>
  </header>

  <!-- Main -->
  <main class="main">

    <!-- Left Panel -->
    <aside class="left-panel">
      <div class="section-title">Rings</div>
      <div class="ring-item" data-element="outer-ring">
        <span><span class="dot outer"></span>Outer</span>
        <span id="valOuterRing">1.8mm</span>
      </div>
      <div class="ring-item" data-element="inner-ring">
        <span><span class="dot inner"></span>Inner</span>
        <span id="valInnerRing">0.8mm</span>
      </div>

      <div class="section-title">Color</div>
      <div id="swatchRow" style="display:flex;gap:4px;flex-wrap:wrap;padding:0 6px;margin-bottom:12px;"></div>
      <input type="color" id="inkColorPicker" value="#1e3a8a" style="display:none">
      <input type="text" id="inkHex" value="#1e3a8a" class="prop-input" placeholder="#000000">

      <div class="section-title">Layers</div>
      <div id="layersList"></div>
    </aside>

    <!-- Workspace -->
    <section class="workspace">
      <div class="canvas-area" id="viewport">
        <div class="canvas-wrap" id="stage">
          <canvas id="stampCanvas"></canvas>
        </div>
      </div>

      <div class="template-bar" id="templateOptions"></div>
    </section>

    <!-- Right Panel -->
    <aside class="right-panel" id="rightPanel">
      <div class="prop-title" id="rpHeader">Properties</div>
      <div class="rp-body" id="rpBody">
        <div style="color:var(--text-dim);font-size:11px;padding:20px 0">Select layer to edit</div>
      </div>
    </aside>

  </main>
</div>

<input type="file" id="importFile" accept="image/*">
<div id="toast" class="toast"></div>
<div class="modal-overlay" id="presetModal">
  <div class="modal">
    <div class="modal-header">
      <span id="presetModalTitle">Preset</span>
      <button class="modal-close" id="presetModalClose">×</button>
    </div>
    <div class="modal-body" id="presetModalBody"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
